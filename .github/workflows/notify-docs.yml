# -------------------------------------------------------------------
# REFERENCE FILE: Add this workflow to wppoland/polski and
# wppoland/polski-pro repositories to trigger automatic doc updates.
#
# Place at: .github/workflows/notify-docs.yml
# Required secret: DOCS_DISPATCH_TOKEN (a PAT with repo scope for
# the wppoland/polski-docs repository)
# -------------------------------------------------------------------

name: Notify docs repo

on:
  push:
    branches: [main, master]
    paths:
      - '**.php'
      - 'docs/wporg-assets/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Trigger docs rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCS_DISPATCH_TOKEN }}
          repository: wppoland/polski-docs
          event-type: polski-updated
          client-payload: '{"repo": "${{ github.repository }}", "ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
